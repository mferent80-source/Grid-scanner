<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Grid lines horizontal -->
  <line x1="80" y1="160" x2="432" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="80" y1="220" x2="432" y2="220" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="80" y1="280" x2="432" y2="280" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="80" y1="340" x2="432" y2="340" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <!-- Grid lines vertical -->
  <line x1="168" y1="100" x2="168" y2="420" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="256" y1="100" x2="256" y2="420" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="344" y1="100" x2="344" y2="420" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <!-- Price range bar (vertical) -->
  <rect x="114" y="130" width="24" height="270" rx="8" fill="rgba(255,255,255,0.25)"/>
  <!-- Active cells highlighted -->
  <rect x="92" y="200" width="68" height="58" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="180" y="260" width="68" height="58" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="268" y="200" width="68" height="58" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="356" y="140" width="68" height="58" rx="6" fill="rgba(255,255,255,0.15)"/>
  <!-- Profit dots on grid -->
  <circle cx="256" cy="220" r="12" fill="white" opacity="0.9"/>
  <circle cx="344" cy="160" r="12" fill="#34d399"/>
  <circle cx="168" cy="280" r="12" fill="#34d399"/>
  <circle cx="256" cy="340" r="10" fill="white" opacity="0.6"/>
  <circle cx="168" cy="160" r="10" fill="white" opacity="0.6"/>
  <!-- Center ₿ symbol small -->
  <text x="256" y="270" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="68" fill="rgba(255,255,255,0.85)">⚙</text>
</svg>
