<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="70" y1="370" x2="450" y2="370" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="70" y1="290" x2="450" y2="290" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="70" y1="210" x2="450" y2="210" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="70" y1="130" x2="450" y2="130" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Candlesticks -->
  <!-- Candle 1 - red -->
  <rect x="90" y="250" width="44" height="100" rx="5" fill="#f87171"/>
  <line x1="112" y1="220" x2="112" y2="250" stroke="#f87171" stroke-width="5"/>
  <line x1="112" y1="350" x2="112" y2="380" stroke="#f87171" stroke-width="5"/>
  <!-- Candle 2 - green -->
  <rect x="160" y="190" width="44" height="120" rx="5" fill="#34d399"/>
  <line x1="182" y1="155" x2="182" y2="190" stroke="#34d399" stroke-width="5"/>
  <line x1="182" y1="310" x2="182" y2="345" stroke="#34d399" stroke-width="5"/>
  <!-- Candle 3 - red -->
  <rect x="230" y="220" width="44" height="90" rx="5" fill="#f87171"/>
  <line x1="252" y1="195" x2="252" y2="220" stroke="#f87171" stroke-width="5"/>
  <line x1="252" y1="310" x2="252" y2="340" stroke="#f87171" stroke-width="5"/>
  <!-- Candle 4 - green big -->
  <rect x="300" y="150" width="44" height="170" rx="5" fill="url(#bar2)"/>
  <line x1="322" y1="110" x2="322" y2="150" stroke="#34d399" stroke-width="5"/>
  <line x1="322" y1="320" x2="322" y2="360" stroke="#34d399" stroke-width="5"/>
  <!-- Candle 5 - green -->
  <rect x="370" y="120" width="44" height="140" rx="5" fill="url(#bar2)"/>
  <line x1="392" y1="85" x2="392" y2="120" stroke="#34d399" stroke-width="5"/>
  <line x1="392" y1="260" x2="392" y2="300" stroke="#34d399" stroke-width="5"/>
  <!-- Trend line -->
  <polyline points="90,335 160,280 230,295 300,240 370,180 450,140" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-dasharray="12,8" stroke-linecap="round"/>
  <!-- Bottom axis -->
  <rect x="70" y="370" width="380" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
</svg>
