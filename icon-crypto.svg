<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Hexagon ring -->
  <polygon points="256,60 380,128 380,264 256,332 132,264 132,128" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"/>
  <!-- Bitcoin B symbol - custom drawn -->
  <!-- Left vertical bar -->
  <rect x="170" y="130" width="36" height="252" rx="8" fill="url(#gold)"/>
  <!-- Top bump -->
  <path d="M200 130 h60 q60 0 60 62 q0 62-60 62 h-60 z" fill="url(#gold)"/>
  <!-- Bottom bump (wider) -->
  <path d="M200 254 h68 q68 0 68 72 q0 72-68 72 h-68 z" fill="url(#gold)"/>
  <!-- Inner cutouts (white) for B shape -->
  <path d="M206 148 h50 q40 0 40 44 q0 44-40 44 h-50 z" fill="#5b21b6"/>
  <path d="M206 272 h56 q46 0 46 52 q0 52-46 52 h-56 z" fill="#5b21b6"/>
  <!-- Serifs top/bottom -->
  <rect x="155" y="118" width="66" height="22" rx="6" fill="url(#gold)"/>
  <rect x="155" y="372" width="66" height="22" rx="6" fill="url(#gold)"/>
  <!-- Shine dots -->
  <circle cx="390" cy="110" r="18" fill="rgba(255,255,255,0.2)"/>
  <circle cx="410" cy="150" r="10" fill="rgba(255,255,255,0.12)"/>
  <circle cx="110" cy="390" r="14" fill="rgba(255,255,255,0.15)"/>
</svg>
