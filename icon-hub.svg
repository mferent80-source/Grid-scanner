<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" fill="url(#shine)"/>
  <!-- Grid of 4 mini charts -->
  <!-- Top-left: bar chart (nasdaq) -->
  <rect x="80" y="240" width="28" height="80" rx="6" fill="white" opacity="0.9"/>
  <rect x="118" y="190" width="28" height="130" rx="6" fill="white" opacity="0.9"/>
  <rect x="156" y="210" width="28" height="110" rx="6" fill="white" opacity="0.9"/>
  <rect x="194" y="160" width="28" height="160" rx="6" fill="#34d399"/>
  <!-- Top-right: line chart (crypto) -->
  <polyline points="272,310 312,260 352,280 392,200 432,220" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="432" cy="220" r="12" fill="#34d399"/>
  <!-- Bottom-left: circle gauge (F&G) -->
  <circle cx="152" cy="400" r="70" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="16"/>
  <circle cx="152" cy="400" r="70" fill="none" stroke="#34d399" stroke-width="16" stroke-dasharray="220 220" stroke-dashoffset="55" stroke-linecap="round" transform="rotate(-90 152 400)"/>
  <text x="152" y="408" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="32" fill="white">65</text>
  <!-- Bottom-right: up arrow trend -->
  <line x1="290" y1="460" x2="430" y2="340" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <polyline points="390,340 430,340 430,380" fill="none" stroke="#34d399" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Divider lines -->
  <line x1="240" y1="80" x2="240" y2="460" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <line x1="80" y1="340" x2="460" y2="340" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
</svg>
