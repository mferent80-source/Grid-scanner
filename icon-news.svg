<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Newspaper page -->
  <rect x="75" y="100" width="320" height="320" rx="16" fill="white" opacity="0.95"/>
  <!-- Header bar -->
  <rect x="75" y="100" width="320" height="64" rx="16" fill="#1e40af"/>
  <rect x="75" y="148" width="320" height="16" fill="#1e40af"/>
  <!-- BTC price big number -->
  <text x="125" y="157" font-family="system-ui,sans-serif" font-weight="900" font-size="28" fill="white">CRYPTO NEWS</text>
  <!-- Article lines -->
  <rect x="100" y="195" width="180" height="14" rx="5" fill="#1e3a5f" opacity="0.7"/>
  <rect x="100" y="218" width="140" height="10" rx="4" fill="#94a3b8" opacity="0.8"/>
  <rect x="100" y="236" width="160" height="10" rx="4" fill="#94a3b8" opacity="0.6"/>
  <!-- Mini chart box -->
  <rect x="295" y="190" width="80" height="70" rx="8" fill="#f0f2fc"/>
  <polyline points="305,248 322,230 340,238 362,212 370,218" fill="none" stroke="#059669" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Divider -->
  <rect x="100" y="272" width="280" height="2" rx="1" fill="#e2e8f0"/>
  <!-- Second article -->
  <rect x="100" y="285" width="200" height="14" rx="5" fill="#1e3a5f" opacity="0.7"/>
  <rect x="100" y="308" width="150" height="10" rx="4" fill="#94a3b8" opacity="0.7"/>
  <rect x="100" y="326" width="170" height="10" rx="4" fill="#94a3b8" opacity="0.5"/>
  <!-- Divider -->
  <rect x="100" y="350" width="280" height="2" rx="1" fill="#e2e8f0"/>
  <!-- Third article short -->
  <rect x="100" y="362" width="180" height="12" rx="4" fill="#1e3a5f" opacity="0.6"/>
  <rect x="100" y="382" width="130" height="10" rx="4" fill="#94a3b8" opacity="0.5"/>
  <!-- Live badge -->
  <rect x="350" y="285" width="50" height="22" rx="11" fill="#dc2626"/>
  <circle cx="364" cy="296" r="5" fill="white"/>
  <text x="372" y="300" font-family="system-ui,sans-serif" font-weight="700" font-size="12" fill="white">LIVE</text>
</svg>
